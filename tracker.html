<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SHRED">
<meta name="theme-color" content="#0a0a0f">
<title>SHRED — Phase 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Outfit:wght@300;400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#222233;
  --text:#e8e8f0;--text2:#9999aa;--text3:#666677;
  --accent:#c8f7c5;--accent2:#7ef078;--accent3:#2a4a28;
  --red:#ff6b6b;--orange:#ffaa5c;--blue:#5c9eff;--blue2:#1a2a40;
  --border:#2a2a3a;--radius:12px;--radius-sm:8px;
}
html{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
body{min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(70px + env(safe-area-inset-bottom)) 0;background:var(--bg)}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(18,18,26,.92);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;color:var(--text3);font-family:'Outfit';font-size:10px;font-weight:600;cursor:pointer;transition:.2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none}

/* HEADER */
.header{padding:16px 20px 12px;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header h1{font-family:'JetBrains Mono';font-size:13px;font-weight:800;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.header p{font-size:12px;color:var(--text2);margin-top:2px}

/* WEEK TABS */
.week-tabs{display:flex;gap:6px;padding:8px 20px 12px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.week-tabs::-webkit-scrollbar{display:none}
.week-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.week-tab.active{background:var(--accent3);border-color:var(--accent);color:var(--accent)}
.week-tab .pct{font-family:'JetBrains Mono';font-size:10px;margin-left:4px;opacity:.7}

/* DAY CARDS */
.days-container{padding:0 16px 20px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:.2s}
.day-card.completed{border-color:var(--accent3);opacity:.7}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;-webkit-user-select:none;user-select:none}
.day-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.day-header h3 .tag{font-family:'JetBrains Mono';font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.tag-chest{background:#3a2040;color:#f0a0d0}
.tag-legs{background:#1a3040;color:#70c0f0}
.tag-core{background:#3a3a10;color:#e0d060}
.tag-pull{background:#102a3a;color:#60b0e0}
.tag-dead{background:#3a2020;color:#f09090}
.tag-shoulder{background:#2a1a3a;color:#c090f0}
.day-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.day-progress span{font-family:'JetBrains Mono';font-size:11px;color:var(--text2)}
.check-ring{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:.2s}
.check-ring.done{border-color:var(--accent);background:var(--accent3)}
.check-ring.done::after{content:'✓';color:var(--accent);font-size:14px;font-weight:700}
.progress-bar{height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent));border-radius:2px;transition:width .4s ease}
.day-body{display:none;padding:0 12px 12px}
.day-card.open .day-body{display:block}

/* SECTIONS */
.section{margin-top:8px;border-radius:var(--radius-sm);overflow:hidden}
.section-header{font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.section-header .toggle{font-size:14px;transition:.2s}
.section.collapsed .section-body{display:none}
.section.collapsed .toggle{transform:rotate(-90deg)}
.s-warmup .section-header{background:#1a2a1a;color:#80c080}
.s-superset .section-header{background:#1a1a2e;color:#8888cc}
.s-core .section-header{background:#2e2a1a;color:#ccaa55}
.s-cardio .section-header{background:#2e1a1a;color:#cc7755}
.s-mobility .section-header{background:#2a1a2e;color:#aa77cc}
.s-weighin .section-header{background:var(--blue2);color:var(--blue)}

/* EXERCISE ROWS */
.ex-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s}
.ex-row:last-child{border-bottom:none}
.ex-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.2s}
.ex-check.checked{background:var(--accent3);border-color:var(--accent)}
.ex-check.checked::after{content:'✓';color:var(--accent);font-size:12px;font-weight:800}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;line-height:1.3;transition:.2s}
.ex-row.done .ex-name{color:var(--text3);text-decoration:line-through}
.ex-detail{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
.ex-reps{font-family:'JetBrains Mono';font-size:11px;color:var(--accent2);font-weight:700}
.ex-notes{font-size:11px;color:var(--text3);font-style:italic}

/* WEIGH-IN SECTION */
.weighin-body{padding:12px}
.weighin-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wi-group{display:flex;flex-direction:column;gap:4px}
.wi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.wi-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono';font-size:14px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none;transition:.2s}
.wi-input:focus{border-color:var(--blue)}
.wi-input::placeholder{color:var(--text3)}
.wi-note{width:100%;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:10px 12px;outline:none;-webkit-appearance:none;transition:.2s}
.wi-note:focus{border-color:var(--blue)}
.wi-note::placeholder{color:var(--text3)}
.wi-btn{width:100%;background:var(--blue2);border:1px solid var(--blue);color:var(--blue);font-family:'Outfit';font-size:13px;font-weight:700;padding:11px;border-radius:var(--radius-sm);cursor:pointer;transition:.2s;letter-spacing:.5px}
.wi-btn:active{opacity:.8}
.wi-last{margin-top:8px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius-sm);font-size:12px;color:var(--text2)}
.wi-last strong{color:var(--blue);font-family:'JetBrains Mono'}

/* PAGE */
.page{display:none;padding:16px 20px 20px}
.page.active{display:block}

/* OVERVIEW */
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.ov-card h3{font-family:'JetBrains Mono';font-size:11px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat{text-align:center}
.stat .num{font-family:'JetBrains Mono';font-size:26px;font-weight:800;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.milestone-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.milestone-row:last-child{border-bottom:none}
.ms-name{font-size:13px;font-weight:600}
.ms-right{display:flex;align-items:center;gap:8px}
.ms-current{font-family:'JetBrains Mono';font-size:14px;color:var(--text2)}
.ms-arrow{color:var(--text3);font-size:12px}
.ms-target{font-family:'JetBrains Mono';font-size:14px;color:var(--accent);font-weight:700}
.ms-done{font-family:'JetBrains Mono';font-size:11px;color:var(--accent2);background:var(--accent3);padding:2px 7px;border-radius:4px;letter-spacing:.5px}

/* WEIGHT LOG */
.wt-log-form{margin-bottom:16px}
.wt-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wt-group{display:flex;flex-direction:column;gap:4px}
.wt-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.wt-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono';font-size:14px;padding:10px 12px;outline:none;width:100%;-webkit-appearance:none;transition:.2s}
.wt-input:focus{border-color:var(--accent)}
.wt-input::placeholder{color:var(--text3)}
.wt-note{width:100%;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:10px 12px;outline:none;-webkit-appearance:none}
.wt-note::placeholder{color:var(--text3)}
.wt-btn{width:100%;background:var(--accent3);border:1px solid var(--accent);color:var(--accent);font-family:'Outfit';font-size:13px;font-weight:700;padding:11px;border-radius:var(--radius-sm);cursor:pointer;transition:.2s;letter-spacing:.5px}
.wt-btn:active{opacity:.8;transform:scale(.98)}

/* TREND BAR */
.trend-wrap{display:flex;align-items:flex-end;gap:3px;height:56px;margin:0 0 14px}
.trend-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:.3s;position:relative;cursor:default}
.trend-bar.down{background:var(--accent3)}
.trend-bar.down.latest{background:var(--accent2)}
.trend-bar.up{background:#3a2020}
.trend-bar.up.latest{background:var(--red)}
.trend-bar[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--text);font-size:10px;padding:3px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;font-family:'JetBrains Mono';z-index:10}

/* WEIGHT HISTORY TABLE */
.wt-table-wrap{overflow-x:auto}
.wt-table{width:100%;border-collapse:collapse;min-width:280px}
.wt-table th{font-family:'JetBrains Mono';font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.wt-table td{font-size:12px;padding:8px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2);vertical-align:middle}
.wt-table td.wt-val{font-family:'JetBrains Mono';font-size:14px;font-weight:700;color:var(--text)}
.wt-table td.wt-date{font-family:'JetBrains Mono';font-size:11px;color:var(--text3)}
.wt-table tr:last-child td{border-bottom:none}
.wt-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;transition:.2s}
.wt-del:hover{color:var(--red);background:rgba(255,107,107,.1)}
.empty-state{padding:20px;text-align:center;color:var(--text3);font-size:13px}

/* RESET */
.reset-section{margin-top:20px;text-align:center}
.reset-btn{background:var(--bg3);border:1px solid var(--border);color:var(--red);font-family:'Outfit';font-size:13px;font-weight:600;padding:10px 24px;border-radius:var(--radius-sm);cursor:pointer}
.reset-week-btn{background:var(--bg3);border:1px solid var(--border);color:var(--orange);font-family:'Outfit';font-size:12px;font-weight:600;padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;margin-top:12px;display:block;width:100%}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;transition:.3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <h1>SHRED//PROGRAM</h1>
  <p id="headerSub">Phase 2 — Building Strength</p>
</div>

<!-- WORKOUT PAGE -->
<div class="page active" id="pageworkout">
  <div class="week-tabs" id="weekTabs"></div>
  <div class="days-container" id="daysContainer"></div>
  <button class="reset-week-btn" onclick="resetCurrentWeek()">Reset This Week's Progress</button>
</div>

<!-- OVERVIEW PAGE -->
<div class="page" id="pageoverview">
  <div class="ov-card">
    <h3>Weight Stats</h3>
    <div class="stat-grid" id="weightStats">
      <div class="stat"><div class="num" id="ov-current">–</div><div class="lbl">Current (lbs)</div></div>
      <div class="stat"><div class="num" id="ov-lost">–</div><div class="lbl">Total Lost</div></div>
      <div class="stat"><div class="num" id="ov-togoal">–</div><div class="lbl">To Goal (195)</div></div>
      <div class="stat"><div class="num" id="ov-entries">–</div><div class="lbl">Weigh-Ins</div></div>
    </div>
  </div>

  <div class="ov-card">
    <h3>Weight Milestones</h3>
    <div class="milestone-row" id="ms-apr"><span class="ms-name">End of April</span><div class="ms-right"><span class="ms-target">220</span></div></div>
    <div class="milestone-row" id="ms-jun"><span class="ms-name">End of June</span><div class="ms-right"><span class="ms-target">210</span></div></div>
    <div class="milestone-row" id="ms-jul"><span class="ms-name">End of July</span><div class="ms-right"><span class="ms-target">205</span></div></div>
    <div class="milestone-row" id="ms-sep"><span class="ms-name">End of September</span><div class="ms-right"><span class="ms-target">195</span></div></div>
  </div>

  <div class="ov-card">
    <h3>Weight Trend</h3>
    <div class="trend-wrap" id="weightTrend"></div>
    <div class="wt-log-form">
      <div class="wt-row">
        <div class="wt-group">
          <span class="wt-label">Weight (lbs)</span>
          <input class="wt-input" type="number" id="inp-wt" placeholder="e.g. 219" step="0.1" min="100" max="400">
        </div>
        <div class="wt-group">
          <span class="wt-label">Date</span>
          <input class="wt-input" type="date" id="inp-wt-date">
        </div>
      </div>
      <input class="wt-note" type="text" id="inp-wt-note" placeholder="Note (optional)">
      <button class="wt-btn" onclick="addWeight()">Log Weight</button>
    </div>
    <div class="wt-table-wrap" id="weightHistory"></div>
  </div>

  <div class="reset-section"><button class="reset-btn" onclick="resetAll()">Reset All Workout Progress</button></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('workout',this)">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h14" stroke-linecap="round"/></svg>
    Workout
  </button>
  <button class="nav-btn" onclick="switchPage('overview',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Overview
  </button>
</nav>

<div class="toast" id="toast"></div>

// ================================================================
// WEIGHT DATA
// ================================================================
const WEIGHTS_KEY = 'shred_weights_v2';
const DEFAULT_WEIGHTS = [
  {w:230, d:'2026-03-15', note:'Starting weight', ts:1742000001},
  {w:226, d:'2026-04-01', note:'', ts:1743500001},
  {w:219, d:'2026-04-15', note:'', ts:1744675201}
];

function loadWeights(){
  try{const d=JSON.parse(localStorage.getItem(WEIGHTS_KEY));if(d&&Array.isArray(d))return d;}catch(e){}
  saveWeights(DEFAULT_WEIGHTS);
  return [...DEFAULT_WEIGHTS];
}
function saveWeights(arr){localStorage.setItem(WEIGHTS_KEY,JSON.stringify(arr));}

function addWeight(w,d,note,ts){
  const arr=loadWeights();
  arr.push({w,d,note:note||'',ts:ts||Date.now()});
  arr.sort((a,b)=>a.d.localeCompare(b.d));
  saveWeights(arr);
}
function deleteWeight(ts){
  const arr=loadWeights().filter(e=>e.ts!==ts);
  saveWeights(arr);
}

// ================================================================
// WORKOUT STATE
// ================================================================
const WORKOUT_KEY = 'shred_p2_v1';
let currentWeek = 5;

function loadState(){try{return JSON.parse(localStorage.getItem(WORKOUT_KEY))||{};}catch(e){return {};}}
function saveState(s){localStorage.setItem(WORKOUT_KEY,JSON.stringify(s));}
function getKey(w,d,si,ei){return `w${w}d${d}s${si}e${ei}`;}
function isChecked(k){return !!loadState()[k];}
function toggleCheck(k){
  const s=loadState();
  if(s[k])delete s[k]; else s[k]=Date.now();
  saveState(s);
  updateCheckboxUI(k);
  renderWeekTabs();
}

function updateCheckboxUI(k){
  const el=document.querySelector(`.ex-check[data-key="${k}"]`);
  if(el){const c=isChecked(k);el.classList.toggle('checked',c);el.closest('.ex-row').classList.toggle('done',c);}
  document.querySelectorAll('.day-card').forEach(card=>{
    let tot=0,dn=0;
    card.querySelectorAll('.ex-check').forEach(cb=>{tot++;if(cb.classList.contains('checked'))dn++;});
    const pct=tot?Math.round(dn/tot*100):0;
    card.classList.toggle('completed',pct===100);
    const sp=card.querySelector('.day-progress span');if(sp)sp.textContent=`${dn}/${tot}`;
    const ring=card.querySelector('.check-ring');if(ring)ring.classList.toggle('done',pct===100);
    const fill=card.querySelector('.progress-fill');if(fill)fill.style.width=pct+'%';
  });
}

// ================================================================
// HELPERS
// ================================================================
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(str){
  if(!str)return '';
  const [y,m,d]=str.split('-');
  return `${parseInt(m)}/${parseInt(d)}/${y.slice(2)}`;
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ================================================================
// WEIGH-IN IN WORKOUT
// ================================================================
function renderWeighInSection(){
  const weights=loadWeights();
  const last=weights.length?weights[weights.length-1]:null;
  return `<div class="section s-weighin">
    <div class="section-header" onclick="toggleSection(this,event)">
      <span>TUESDAY WEIGH-IN</span><span class="toggle">▼</span>
    </div>
    <div class="section-body">
      <div class="weighin-body">
        <div class="weighin-row">
          <div class="wi-group">
            <span class="wi-label">Weight (lbs)</span>
            <input class="wi-input" type="number" id="wi-wt" placeholder="e.g. 219" step="0.1" min="100" max="400">
          </div>
          <div class="wi-group">
            <span class="wi-label">Date</span>
            <input class="wi-input" type="date" id="wi-dt" value="${todayStr()}">
          </div>
        </div>
        <input class="wi-note" type="text" id="wi-note" placeholder="Note (optional — e.g. fasted, morning)">
        <button class="wi-btn" onclick="logWeighIn()">Log Weight → Overview</button>
        ${last?`<div class="wi-last">Last weigh-in: <strong>${last.w} lbs</strong> on ${fmtDate(last.d)}${weights.length>1&&last.w<weights[0].w?' — <span style="color:var(--accent2)">↓'+(weights[0].w-last.w).toFixed(1)+' lbs from start</span>':''}</div>`:''}
      </div>
    </div>
  </div>`;
}

function logWeighIn(){
  const wEl=document.getElementById('wi-wt');
  const dEl=document.getElementById('wi-dt');
  const nEl=document.getElementById('wi-note');
  const w=parseFloat(wEl.value);
  if(!w||w<80||w>500){showToast('Enter a valid weight');return;}
  const d=dEl.value||todayStr();
  addWeight(w,d,nEl.value.trim());
  wEl.value='';nEl.value='';
  showToast(`✓ ${w} lbs logged to Overview`);
  // Re-render the weigh-in section in place
  document.querySelectorAll('.s-weighin').forEach(el=>{
    el.outerHTML=renderWeighInSection();
  });
}

// ================================================================
// RENDERING — WORKOUTS
// ================================================================
function renderWeekTabs(){
  const el=document.getElementById('weekTabs');el.innerHTML='';
  for(let w=5;w<=8;w++){
    const days=PROGRAM[w];let tot=0,dn=0;
    days.forEach((day,di)=>day.sections.forEach((sec,si)=>sec.exercises.forEach((ex,ei)=>{if(!ex.n)return;tot++;if(isChecked(getKey(w,di,si,ei)))dn++;})));
    const pct=tot?Math.round(dn/tot*100):0;
    const tab=document.createElement('div');
    tab.className='week-tab'+(w===currentWeek?' active':'');
    tab.innerHTML=`${w===8?'W8 Deload':'Week '+w}<span class="pct">${pct}%</span>`;
    tab.onclick=()=>{currentWeek=w;renderDays();renderWeekTabs();};
    el.appendChild(tab);
  }
}

function renderDays(){
  const el=document.getElementById('daysContainer');el.innerHTML='';
  const days=PROGRAM[currentWeek];
  days.forEach((day,di)=>{
    let tot=0,dn=0;
    day.sections.forEach((sec,si)=>sec.exercises.forEach((ex,ei)=>{if(!ex.n)return;tot++;if(isChecked(getKey(currentWeek,di,si,ei)))dn++;}));
    const pct=tot?Math.round(dn/tot*100):0;
    const completed=pct===100;
    const card=document.createElement('div');
    card.className='day-card'+(completed?' completed':'');
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay(this,event)">
        <h3><span class="tag ${day.tagClass}">${day.tag}</span>${day.title}<br><small style="font-weight:400;font-size:11px;color:var(--text2)">${day.subtitle}</small></h3>
        <div class="day-progress"><span>${dn}/${tot}</span><div class="check-ring${completed?' done':''}"></div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="day-body">${renderSections(day.sections,currentWeek,di)}</div>`;
    el.appendChild(card);
  });
}

function renderSections(sections,week,dayIdx){
  return sections.map((sec,si)=>{
    if(sec.type==='weighin') return renderWeighInSection();
    const sClass='s-'+sec.type;
    const rows=sec.exercises.map((ex,ei)=>{
      if(!ex.n)return '';
      const k=getKey(week,dayIdx,si,ei);const c=isChecked(k);
      return `<div class="ex-row${c?' done':''}">
        <div class="ex-check${c?' checked':''}" data-key="${k}" onclick="toggleCheck('${k}')"></div>
        <div class="ex-info">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-detail"><span class="ex-reps">${ex.r}</span>${ex.note?`<span class="ex-notes">${ex.note}</span>`:''}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="section ${sClass}">
      <div class="section-header" onclick="toggleSection(this,event)"><span>${sec.name}</span><span class="toggle">▼</span></div>
      <div class="section-body">${rows}</div>
    </div>`;
  }).join('');
}

// ================================================================
// RENDERING — OVERVIEW
// ================================================================
function renderOverview(){
  const weights=loadWeights();
  if(!weights.length){
    document.getElementById('ov-current').textContent='–';
    document.getElementById('ov-lost').textContent='–';
    document.getElementById('ov-togoal').textContent='–';
    document.getElementById('ov-entries').textContent='0';
    document.getElementById('weightTrend').innerHTML='';
    document.getElementById('weightHistory').innerHTML='<div class="empty-state">No entries yet.</div>';
    return;
  }
  const latest=weights[weights.length-1];
  const first=weights[0];
  const lost=(first.w-latest.w).toFixed(1);
  const toGoal=Math.max(0,(latest.w-195)).toFixed(1);

  document.getElementById('ov-current').textContent=latest.w;
  document.getElementById('ov-lost').textContent=(parseFloat(lost)>0?'-':'')+lost;
  document.getElementById('ov-togoal').textContent=toGoal;
  document.getElementById('ov-entries').textContent=weights.length;

  // Milestones
  const goals=[
    {id:'ms-apr',target:220,label:'End of April'},
    {id:'ms-jun',target:210,label:'End of June'},
    {id:'ms-jul',target:205,label:'End of July'},
    {id:'ms-sep',target:195,label:'End of September'}
  ];
  goals.forEach(g=>{
    const el=document.getElementById(g.id);
    const done=latest.w<=g.target;
    el.innerHTML=`<span class="ms-name">${g.label}</span><div class="ms-right">
      <span class="ms-current">${latest.w}</span>
      <span class="ms-arrow">→</span>
      <span class="ms-target">${g.target}</span>
      ${done?'<span class="ms-done">✓ DONE</span>':''}
    </div>`;
  });

  // Trend bars
  const show=weights.slice(-14);
  const mn=Math.min(...show.map(e=>e.w));
  const mx=Math.max(...show.map(e=>e.w));
  const range=mx-mn||1;
  const trendEl=document.getElementById('weightTrend');
  trendEl.innerHTML=show.map((e,i)=>{
    const h=Math.round(8+((mx-e.w)/range)*44);
    const isDown=i===0||(e.w<=show[i-1].w);
    const isLatest=i===show.length-1;
    return `<div class="trend-bar${isDown?' down':' up'}${isLatest?' latest':''}" style="height:${h}px" data-tip="${e.w}lbs ${fmtDate(e.d)}"></div>`;
  }).join('');

  // History table
  const rows=[...weights].reverse().map((e,ri)=>{
    const realIdx=weights.length-1-ri;
    const prev=realIdx>0?weights[realIdx-1].w:null;
    const chg=prev!=null?(e.w-prev).toFixed(1):null;
    const chgColor=chg!=null?(parseFloat(chg)<0?'var(--accent2)':'var(--red)'):'';
    return `<tr>
      <td class="wt-date">${fmtDate(e.d)}</td>
      <td class="wt-val">${e.w}</td>
      <td style="font-family:'JetBrains Mono';font-size:11px;color:${chgColor}">${chg!=null?(parseFloat(chg)>0?'+':'')+chg:'–'}</td>
      <td style="font-size:11px;color:var(--text3);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.note||''}</td>
      <td><button class="wt-del" onclick="deleteWeightEntry(${e.ts})">✕</button></td>
    </tr>`;
  }).join('');
  document.getElementById('weightHistory').innerHTML=`<table class="wt-table">
    <thead><tr><th>Date</th><th>Weight</th><th>Change</th><th>Note</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function addWeight_fromForm(){
  const wEl=document.getElementById('inp-wt');
  const dEl=document.getElementById('inp-wt-date');
  const nEl=document.getElementById('inp-wt-note');
  const w=parseFloat(wEl.value);
  if(!w||w<80||w>500){showToast('Enter a valid weight');return;}
  addWeight(w,dEl.value||todayStr(),nEl.value.trim());
  wEl.value='';nEl.value='';
  showToast(`✓ ${w} lbs logged`);
  renderOverview();
}

function deleteWeightEntry(ts){
  deleteWeight(ts);
  renderOverview();
}

// ================================================================
// INTERACTIONS
// ================================================================
function toggleDay(el,evt){
  if(evt&&evt.target.closest('.ex-check'))return;
  el.closest('.day-card').classList.toggle('open');
}
function toggleSection(el,evt){
  if(evt&&evt.target.closest('.ex-check,.wi-btn,.wi-input,.wi-note'))return;
  el.closest('.section').classList.toggle('collapsed');
}
function switchPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(page==='overview')renderOverview();
}
function resetCurrentWeek(){
  if(!confirm(`Reset all Week ${currentWeek} progress?`))return;
  const s=loadState();const prefix=`w${currentWeek}`;
  Object.keys(s).forEach(k=>{if(k.startsWith(prefix))delete s[k];});
  saveState(s);renderDays();renderWeekTabs();
}
function resetAll(){
  if(!confirm('Reset all workout progress? Weight data will not be affected.'))return;
  localStorage.removeItem(WORKOUT_KEY);
  renderDays();renderWeekTabs();
}

// Expose log button
document.getElementById('inp-wt-date').value=todayStr();
document.querySelector('.wt-btn').onclick=addWeight_fromForm;

// Init
renderWeekTabs();
renderDays();
</script>
</body>
</html>
